name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: trunk-io/trunk-action@v1

  skillguard:
    name: SkillGuard Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: gisk0/skillguard-scanner
          path: .skillguard
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run SkillGuard scan
        run: |
          mkdir -p /tmp/skillguard
          python3 .skillguard/scripts/scanner.py \
            --skills-dir . \
            --skill skill \
            --json-out /tmp/skillguard/results.json 2>&1 || true

          # Only fail on HIGH/CRITICAL findings that aren't expected FPs
          python3 - <<'PYEOF'
          import json, sys

          with open("/tmp/skillguard/results.json") as f:
              data = json.load(f)

          # Whitelist: known false positives (check_name: max_severity)
          # This skill legitimately reads API keys to ping providers
          FP_WHITELIST = {
              "credential_access": "MEDIUM",
          }

          blockers = []
          whitelisted = 0
          for report in data.get("reports", []):
              risk = report.get("risk_level", "").upper()
              for finding in report.get("findings", []):
                  severity = finding.get("severity", "").upper()
                  check = finding.get("check", "")
                  line = f"[{severity}] {check}: {finding.get('file', '?')}:{finding.get('line', '?')} — {finding.get('detail', '')}"

                  max_fp = FP_WHITELIST.get(check)
                  sev_order = {"LOW": 0, "MEDIUM": 1, "HIGH": 2, "CRITICAL": 3}
                  if max_fp and sev_order.get(severity, 99) <= sev_order.get(max_fp, -1):
                      whitelisted += 1
                  else:
                      blockers.append(line)

          if whitelisted:
              print(f"ℹ️  {whitelisted} whitelisted findings (credential_access ≤ MEDIUM)")

          # Check aggregate risk level per skill
          for report in data.get("reports", []):
              risk = report.get("risk_level", "").upper()
              if risk in ("HIGH", "CRITICAL"):
                  blockers.append(f"[{risk}] Aggregate risk score: {report.get('risk_score', '?')} for '{report.get('name', '?')}'")

          if blockers:
              print(f"\n❌ SkillGuard: {len(blockers)} blocking issues — failing CI:")
              for b in blockers:
                  print(f"  {b}")
              sys.exit(1)
          else:
              print("✅ SkillGuard passed — no HIGH/CRITICAL findings or aggregate risk")
          PYEOF
