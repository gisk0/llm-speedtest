name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: trunk-io/trunk-action@v1

  skillguard:
    name: SkillGuard Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: gisk0/skillguard-scanner
          path: .skillguard
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run SkillGuard scan
        run: |
          mkdir -p /tmp/skillguard
          python3 .skillguard/scripts/scanner.py \
            --skills-dir . \
            --skill skill \
            --json-out /tmp/skillguard/results.json 2>&1 || true

          # Only fail on HIGH/CRITICAL findings that aren't expected FPs
          python3 - <<'PYEOF'
          import json, sys

          with open("/tmp/skillguard/results.json") as f:
              data = json.load(f)

          # Expected FPs for this skill (legitimately reads API keys)
          EXPECTED_FPS = {"credential_access"}

          blockers = []
          for report in data.get("reports", []):
              for finding in report.get("findings", []):
                  severity = finding.get("severity", "").upper()
                  check = finding.get("check", "")
                  if severity in ("HIGH", "CRITICAL") and check not in EXPECTED_FPS:
                      blockers.append(
                          f"  [{severity}] {check}: {finding.get('file', '?')}:{finding.get('line', '?')}"
                          f" — {finding.get('detail', '')}"
                      )

          if blockers:
              print("❌ SkillGuard found blocking issues:")
              for b in blockers:
                  print(b)
              sys.exit(1)
          else:
              print("✅ SkillGuard passed — no HIGH/CRITICAL findings")
              print("   (MEDIUM credential_access findings are expected FPs)")
          PYEOF
